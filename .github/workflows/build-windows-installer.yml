name: Build Windows Downloader Installer
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-windows-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Build manager UI distribution
        shell: powershell
        run: .\gradlew.bat :manager:clean :manager:jar :manager:installDist -PjavafxPlatform=win

      - name: Stage jpackage input
        shell: powershell
        run: |
          $StagingDir = "build/package-input"
          $OutputDir = "build/jpackage"

          if (Test-Path $StagingDir) { Remove-Item -Recurse -Force $StagingDir }
          if (Test-Path $OutputDir) { Remove-Item -Recurse -Force $OutputDir }

          New-Item -ItemType Directory -Force -Path $StagingDir | Out-Null
          New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null

          # 1. Copy over manager wizard dependencies
          Copy-Item -Path "manager/build/install/manager/lib/*" -Destination $StagingDir -Recurse -Force
          
          # 2. Stage the main manager UI jar cleanly into root
          Copy-Item -Path "manager/build/libs/manager-*.jar" -Destination "$StagingDir/manager.jar" -Force -ErrorAction SilentlyContinue
          if (!(Test-Path "$StagingDir/manager.jar")) {
              Copy-Item -Path "manager/build/libs/manager.jar" -Destination "$StagingDir/manager.jar" -Force
          }

          # 3. Handle payloads from the release zip
          $ReleaseZip = "cloudcard-photo-downloader.zip"
          $ReleaseExtractDir = "build/release-payload"

          if (!(Test-Path $ReleaseZip)) {
            throw "Required release payload missing: $ReleaseZip. Run the downloader release process first and place the zip in the repository root."
          }

          if (Test-Path $ReleaseExtractDir) { Remove-Item -Recurse -Force $ReleaseExtractDir }
          New-Item -ItemType Directory -Force -Path $ReleaseExtractDir | Out-Null

          Expand-Archive -Path $ReleaseZip -DestinationPath $ReleaseExtractDir -Force

          $DownloaderJar = Get-ChildItem -Path $ReleaseExtractDir -Recurse -Filter "cloudcard-photo-downloader.jar" | Select-Object -First 1
          $ServyDir = "external/servy"

          if ($null -eq $DownloaderJar) {
            throw "cloudcard-photo-downloader.jar was not found inside $ReleaseZip."
          }

          if (!(Test-Path $ServyDir)) {
            throw "Servy directory missing from repository: $ServyDir."
          }

          if (!(Test-Path "$ServyDir/servy-cli.exe")) {
            throw "servy-cli.exe was not found inside $ServyDir."
          }

          # 4. Stage downloader jar and bundled Servy runtime at app root
          Copy-Item -Path $DownloaderJar.FullName -Destination "$StagingDir/cloudcard-photo-downloader.jar" -Force
          Copy-Item -Path $ServyDir -Destination $StagingDir -Recurse -Force

          # 5. Stage branding icon inside input so jpackage can catch it
          if (Test-Path "rp.ico") {
              Copy-Item -Path "rp.ico" -Destination $StagingDir -Force
          }

          # 6. Stage user-facing help README at app root
          if (!(Test-Path "MANAGER.README.txt")) {
            throw "MANAGER.README.txt missing from repository root. The manager Help button expects this file at app/MANAGER.README.txt."
          }

          Copy-Item -Path "MANAGER.README.txt" -Destination "$StagingDir/MANAGER.README.txt" -Force

      - name: Build Windows MSI
        shell: powershell
        run: |
          # Use the Gradle project version for the MSI version.
          $AppVersion = ./gradlew properties -q | Select-String "^version:" | ForEach-Object {
            $_.ToString().Split(":")[1].Trim()
          }

          # jpackage/MSI expects a numeric app version, so remove suffixes such as -SNAPSHOT.
          $AppVersion = $AppVersion -replace '-.*$', ''

          if ($AppVersion -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Gradle version '$AppVersion' is invalid for Windows MSI format. Use 3 or 4 numeric parts, for example 1.0.123 or 1.0.123.4."
          }

          "APP_VERSION=$AppVersion" >> $env:GITHUB_ENV
          jpackage `
            --type msi `
            --name "RemotePhoto Downloader" `
            --app-version "$AppVersion" `
            --input "build/package-input" `
            --main-jar "manager.jar" `
            --main-class "ai.remotephoto.downloader.manager.Launcher" `
            --dest "build/jpackage" `
            --runtime-image "$env:JAVA_HOME" `
            --java-options "-Dapp.home=`$APPDIR" `
            --icon "build/package-input/rp.ico" `
            --win-shortcut `
            --win-menu `
            --verbose

      - name: Azure OIDC login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign MSI
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: https://eus.codesigning.azure.net
          signing-account-name: cloudcard-signing
          certificate-profile-name: cloudcard
          files-folder: build/jpackage
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemotePhoto-Downloader-Windows-MSI-${{ env.APP_VERSION }}
          path: build/jpackage/*.msi
          retention-days: 7
          
