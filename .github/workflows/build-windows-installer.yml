name: Build Windows Downloader Installer
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release/version label for this Windows app image'
        required: false
        type: string

jobs:
  build-windows-app-image:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Build setup UI distribution
        shell: powershell
        run: .\gradlew.bat :setup-ui:clean :setup-ui:jar :setup-ui:installDist -PjavafxPlatform=win

      - name: Stage jpackage input
        shell: powershell
        run: |
          $StagingDir = "build/package-input"
          $OutputDir = "build/jpackage"

          if (Test-Path $StagingDir) { Remove-Item -Recurse -Force $StagingDir }
          if (Test-Path $OutputDir) { Remove-Item -Recurse -Force $OutputDir }

          New-Item -ItemType Directory -Force -Path $StagingDir | Out-Null
          New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null

          Copy-Item -Path "setup-ui/build/install/setup-ui/lib/*" -Destination $StagingDir -Recurse -Force
          
          Copy-Item -Path "setup-ui/build/libs/setup-ui-*.jar" -Destination "$StagingDir/setup-ui.jar" -Force -ErrorAction SilentlyContinue
          if (!(Test-Path "$StagingDir/setup-ui.jar")) {
              Copy-Item -Path "setup-ui/build/libs/setup-ui.jar" -Destination "$StagingDir/setup-ui.jar" -Force
          }

          $ReleaseZip = "cloudcard-photo-downloader.zip"
          $ReleaseExtractDir = "build/release-payload"

          if (!(Test-Path $ReleaseZip)) {
            throw "Required release payload missing: $ReleaseZip. Run the downloader release process first and place the zip in the repository root."
          }

          if (Test-Path $ReleaseExtractDir) { Remove-Item -Recurse -Force $ReleaseExtractDir }
          New-Item -ItemType Directory -Force -Path $ReleaseExtractDir | Out-Null

          Expand-Archive -Path $ReleaseZip -DestinationPath $ReleaseExtractDir -Force

          $DownloaderJar = Get-ChildItem -Path $ReleaseExtractDir -Recurse -Filter "cloudcard-photo-downloader.jar" | Select-Object -First 1
          $ServyDir = Get-ChildItem -Path $ReleaseExtractDir -Recurse -Directory -Filter "servy" | Select-Object -First 1

          if ($null -eq $DownloaderJar) {
            throw "cloudcard-photo-downloader.jar was not found inside $ReleaseZip."
          }

          if ($null -eq $ServyDir) {
            throw "servy directory was not found inside $ReleaseZip. Expected the release zip to contain external/servy copied into cloudcard-photo-downloader/servy."
          }

          if (!(Test-Path "$($ServyDir.FullName)\servy-cli.exe")) {
            throw "servy-cli.exe was not found inside $($ServyDir.FullName)."
          }

          Copy-Item -Path $DownloaderJar.FullName -Destination "$StagingDir/cloudcard-photo-downloader.jar" -Force
          Copy-Item -Path $ServyDir.FullName -Destination $StagingDir -Recurse -Force

          $LauncherConfigDir = "build/jpackage-launchers"
          if (Test-Path $LauncherConfigDir) { Remove-Item -Recurse -Force $LauncherConfigDir }
          New-Item -ItemType Directory -Force -Path $LauncherConfigDir | Out-Null
          
          # Build the additional launcher for the setup wizard UI.
          @(
            "main-jar=setup-ui.jar"
            "main-class=ai.remotephoto.setup.Launcher"
            "win-console=false"
          ) | Set-Content -Path "$LauncherConfigDir/setup-wizard-launcher.properties" -Encoding ascii
          
          Write-Host "=== setup-wizard-launcher.properties ==="
          Get-Content "$LauncherConfigDir/setup-wizard-launcher.properties"
          Write-Host "========================================"

      - name: Build Windows app image
        shell: powershell
        run: |
          jpackage `
            --type app-image `
            --name "CloudCard Downloader" `
            --input "build/package-input" `
            --main-jar "cloudcard-photo-downloader.jar" `
            --main-class "org.springframework.boot.loader.launch.JarLauncher" `
            --dest "build/jpackage" `
            --runtime-image "$env:JAVA_HOME" `
            --java-options "-Dapp.home=`$APPDIR" `
            --add-launcher "CloudCard Setup=build/jpackage-launchers/setup-wizard-launcher.properties" `
            --verbose

      - name: Upload app image artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudCard-Setup-Windows-App-Image-${{ github.event.inputs.version || github.run_number }}
          path: build/jpackage/CloudCard Downloader/
          retention-days: 7
